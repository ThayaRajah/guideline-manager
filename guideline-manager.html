<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PromoBuilder - Guidelines Manager</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --blue: #0F7EA8;
      --blue-bg: #e5f3f9;
      --blue-dark: #0c6789;
      --blue-light: #e3f1f7;
      --blue-nav: #1689b3;
      --grey-bg: #f4f5f7;
      --grey-header: #ededed;
      --grey-border: #e0e0e0;
      --grey-line: #eaeaea;
      --text: #2b2b2b;
      --text-soft: #6b6b6b;
      --text-light: #9a9a9a;
      --green: #2e8540;
      --green-bg: #e6f4ea;
      --yellow: #b7791f;
      --yellow-bg: #fdf3d8;
      --red: #c0392b;
    }

    body {
      font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #d9dde2;
      color: var(--text);
      font-size: 14px;
      line-height: 1.4;
      padding: 24px;
    }

    .screen-nav {
      max-width: 1280px;
      margin: 0 auto 24px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      background: #fff;
      padding: 12px;
      border-radius: 8px;
      box-shadow: 0 1px 4px rgba(0, 0, 0, .1);
    }

    .screen-nav button {
      border: 1px solid var(--grey-border);
      background: #fff;
      padding: 7px 12px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 12.5px;
      color: var(--text-soft);
      transition: all .15s;
    }

    .screen-nav button:hover {
      background: var(--grey-bg);
    }

    .screen-nav button.active {
      background: var(--blue);
      color: #fff;
      border-color: var(--blue);
    }

    /* Browser frame */
    .window {
      max-width: 1280px;
      margin: 0 auto;
      background: #1c1c1e;
      border-radius: 12px;
      padding: 0;
      box-shadow: 0 20px 60px rgba(0, 0, 0, .4);
      overflow: hidden;
    }

    .titlebar {
      height: 38px;
      display: flex;
      align-items: center;
      padding: 0 14px;
      gap: 8px;
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
    }

    .dot.r {
      background: #ff5f57;
    }

    .dot.y {
      background: #febc2e;
    }

    .dot.g {
      background: #28c840;
    }

    .urlbar {
      background: #2c2c2e;
      height: 34px;
      display: flex;
      align-items: center;
      padding: 0 14px;
      gap: 12px;
    }

    .urlbar .nav-ico {
      color: #999;
      font-size: 15px;
    }

    .url {
      flex: 1;
      background: #1c1c1e;
      border-radius: 6px;
      height: 24px;
      display: flex;
      align-items: center;
      padding: 0 12px;
      color: #c7c7c7;
      font-size: 12px;
    }

    .url b {
      color: #fff;
      font-weight: 500;
    }

    /* App shell */
    .app {
      background: #fff;
      display: flex;
      flex-direction: column;
      min-height: 720px;
    }

    .topbar {
      height: 58px;
      border-bottom: 1px solid var(--grey-border);
      display: flex;
      align-items: center;
      padding: 0 22px;
      background: #fafafa;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo-mark {
      width: 28px;
      height: 28px;
      background: var(--blue);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-weight: 700;
      font-size: 16px;
    }

    .logo-text {
      font-weight: 700;
      font-size: 15px;
      letter-spacing: .3px;
    }

    .logo-text span {
      font-weight: 400;
      color: var(--text-soft);
    }

    .tenant {
      margin-left: 30px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 600;
      font-size: 14px;
    }

    .tenant .chev {
      color: var(--text-light);
    }

    .crumb-top {
      margin-left: 22px;
      color: var(--text-light);
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .crumb-top b {
      color: var(--text);
    }

    .topbar-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 22px;
      color: var(--text-soft);
      font-size: 13px;
    }

    .topbar-right .item {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
    }

    .topbar-right .user {
      color: var(--blue);
    }

    .topbar-right .lang {
      color: var(--blue);
      font-weight: 600;
    }

    .topbar-right .lang span {
      color: var(--text-light);
      font-weight: 400;
    }

    .bell {
      position: relative;
    }

    .bell::after {
      content: "";
      position: absolute;
      top: -2px;
      right: -2px;
      width: 7px;
      height: 7px;
      background: var(--red);
      border-radius: 50%;
    }

    .main {
      display: flex;
      flex: 1;
    }

    .sidebar {
      width: 232px;
      border-right: 1px solid var(--grey-border);
      background: #fff;
      padding: 18px 0;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 20px;
      font-weight: 600;
      color: var(--text);
      cursor: pointer;
      font-size: 13.5px;
    }

    .nav-item .ico {
      width: 18px;
      text-align: center;
      opacity: .7;
    }

    .nav-item .arr {
      margin-left: auto;
      color: var(--text-light);
      font-size: 11px;
    }

    .nav-item.active {
      background: var(--blue);
      color: #fff;
    }

    .nav-item.active .ico {
      opacity: 1;
    }

    .nav-sub {
      padding: 10px 20px 10px 50px;
      font-size: 13px;
      color: var(--text-soft);
      cursor: pointer;
    }

    .nav-sub.active {
      background: var(--blue-light);
      color: var(--blue-dark);
      font-weight: 500;
    }

    .content {
      flex: 1;
      padding: 26px 30px;
      background: #fff;
    }

    .page-crumb {
      font-size: 21px;
      font-weight: 700;
      margin-bottom: 22px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .page-crumb .sep {
      color: var(--text-light);
      font-weight: 400;
    }

    .page-crumb .mut {
      color: var(--text-light);
      font-weight: 500;
      font-size: 14px;
    }

    .breadcrumb-line {
      font-size: 12.5px;
      color: var(--text-light);
      margin-bottom: 6px;
      display: flex;
      gap: 7px;
      flex-wrap: wrap;
    }

    .breadcrumb-line .cur {
      color: var(--blue-dark);
      font-weight: 600;
    }

    /* Toolbar */
    .toolbar {
      display: flex;
      gap: 14px;
      margin-bottom: 18px;
      align-items: center;
    }

    .btn {
      border: 1px solid var(--grey-border);
      background: #fff;
      border-radius: 6px;
      padding: 11px 18px;
      font-size: 13.5px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--text);
      font-weight: 500;
    }

    .btn:hover {
      background: var(--grey-bg);
    }

    .btn .plus {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 1.5px solid var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
    }

    .btn-primary {
      background: var(--blue);
      color: #fff;
      border-color: var(--blue);
    }

    .btn-primary:hover {
      background: var(--blue-dark);
    }

    .btn-ghost {
      background: transparent;
    }

    .search {
      flex: 1;
      border: 1px solid var(--grey-border);
      border-radius: 6px;
      height: 42px;
      display: flex;
      align-items: center;
      padding: 0 14px;
      gap: 10px;
      color: var(--text-light);
    }

    .search.sm {
      height: 36px;
      max-width: 320px;
    }

    /* Table */
    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead th {
      background: var(--grey-header);
      text-align: left;
      padding: 13px 16px;
      font-weight: 600;
      font-size: 13px;
      color: #444;
      border-bottom: 1px solid var(--grey-border);
    }

    tbody td {
      padding: 15px 16px;
      border-bottom: 1px solid var(--grey-line);
      font-size: 13.5px;
    }

    tbody tr:hover {
      background: #fafbfc;
    }

    .badge {
      display: inline-block;
      padding: 4px 11px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
    }

    .badge.active {
      background: var(--green-bg);
      color: var(--green);
    }

    .badge.draft {
      background: var(--yellow-bg);
      color: var(--yellow);
    }

    .badge.inactive {
      background: #f0f0f0;
      color: #888;
    }

    .kebab {
      font-size: 18px;
      color: var(--text-soft);
      cursor: pointer;
      letter-spacing: 1px;
    }

    .link {
      color: var(--blue);
      cursor: pointer;
      font-weight: 500;
    }

    /* Kebab dropdown */
    .kebab-wrap {
      position: relative;
      display: inline-block;
    }

    .dropdown {
      position: absolute;
      right: 0;
      top: 26px;
      background: #fff;
      border: 1px solid var(--grey-border);
      border-radius: 8px;
      box-shadow: 0 6px 20px rgba(0, 0, 0, .15);
      min-width: 190px;
      z-index: 20;
      overflow: hidden;
    }

    .dropdown .opt {
      padding: 12px 16px;
      font-size: 13.5px;
      cursor: pointer;
    }

    .dropdown .opt:hover {
      background: var(--grey-bg);
    }

    .dropdown .opt.new {
      background: var(--blue-light);
      color: var(--blue-dark);
      font-weight: 600;
      border-top: 1px solid var(--grey-border);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .dropdown .opt.new .tag {
      font-size: 9px;
      background: var(--blue);
      color: #fff;
      padding: 2px 6px;
      border-radius: 4px;
      margin-left: auto;
    }

    .dropdown .opt.new:hover {
      background: #d3e8f1;
    }

    /* Cards */
    .card {
      border: 1px solid var(--grey-border);
      border-radius: 10px;
      background: #fff;
      margin-bottom: 22px;
    }

    .card-head {
      padding: 16px 20px;
      border-bottom: 1px solid var(--grey-line);
      font-weight: 700;
      font-size: 15px;
      display: flex;
      align-items: center;
    }

    .card-body {
      padding: 20px;
    }

    /* Upload */
    .upload-zone {
      border: 2px dashed var(--blue);
      border-radius: 12px;
      background: #f7fbfd;
      padding: 50px;
      text-align: center;
      color: var(--text-soft);
    }

    .upload-zone .big {
      font-size: 40px;
      color: var(--blue);
      margin-bottom: 14px;
    }

    .upload-zone .t1 {
      font-size: 17px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 6px;
    }

    .upload-zone .t2 {
      font-size: 13.5px;
      margin-bottom: 4px;
    }

    .upload-zone .formats {
      font-size: 12px;
      color: var(--text-light);
      margin-top: 8px;
    }

    .file-result {
      display: flex;
      gap: 30px;
      margin-top: 24px;
      padding: 20px;
      background: var(--grey-bg);
      border-radius: 10px;
      flex-wrap: wrap;
    }

    .file-meta {
      font-size: 13px;
    }

    .file-meta .lbl {
      color: var(--text-light);
      font-size: 11.5px;
      text-transform: uppercase;
      letter-spacing: .4px;
      margin-bottom: 3px;
    }

    .file-meta .val {
      font-weight: 600;
    }

    .file-meta .val.ok {
      color: var(--green);
    }

    .progress {
      height: 8px;
      background: #dfe3e6;
      border-radius: 4px;
      margin-top: 20px;
      overflow: hidden;
    }

    .progress>div {
      height: 100%;
      width: 100%;
      background: var(--green);
    }

    /* Filter chips */
    .chips {
      display: flex;
      gap: 9px;
      margin-bottom: 16px;
    }

    .chip {
      padding: 7px 16px;
      border-radius: 18px;
      border: 1px solid var(--grey-border);
      font-size: 12.5px;
      cursor: pointer;
      background: #fff;
    }

    .chip.active {
      background: var(--blue);
      color: #fff;
      border-color: var(--blue);
    }

    .summary-card {
      display: flex;
      gap: 0;
      border: 1px solid var(--grey-border);
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 20px;
    }

    .summary-card .seg {
      flex: 1;
      padding: 18px 22px;
      border-right: 1px solid var(--grey-line);
    }

    .summary-card .seg:last-child {
      border-right: none;
    }

    .summary-card .num {
      font-size: 26px;
      font-weight: 700;
      color: var(--blue);
    }

    .summary-card .cap {
      font-size: 12.5px;
      color: var(--text-soft);
      margin-top: 2px;
    }

    .check {
      width: 18px;
      height: 18px;
      border-radius: 4px;
      border: 1.5px solid var(--blue);
      background: var(--blue);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 12px;
    }

    .remove {
      width: 18px;
      height: 18px;
      border-radius: 4px;
      border: 1.5px solid var(#fff);
      background: var(#fff);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 12px;
    }

    /* 3 panel editor */
    .editor {
      display: flex;
      gap: 0;
      border: 1px solid var(--grey-border);
      border-radius: 10px;
      overflow: hidden;
      min-height: 540px;
    }

    .panel {
      border-right: 1px solid var(--grey-border);
    }

    .panel:last-child {
      border-right: none;
    }

    .panel-l {
      width: 240px;
      background: #fafafa;
    }

    .panel-c {
      flex: 1;
      background: #fff;
      display: flex;
      flex-direction: column;
    }

    .panel-r {
      width: 320px;
      background: #fafafa;
    }

    .panel-title {
      padding: 14px 18px;
      font-weight: 700;
      font-size: 13.5px;
      border-bottom: 1px solid var(--grey-line);
      background: #fff;
    }

    .nav-group {
      padding: 14px 18px;
    }

    .nav-group .grp-lbl {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .5px;
      color: var(--text-light);
      font-weight: 700;
      margin-bottom: 8px;
    }

    .nav-group .leaf {
      padding: 7px 12px;
      font-size: 13px;
      border-radius: 5px;
      cursor: pointer;
      color: var(--text-soft);
    }

    .nav-group .leaf:hover {
      background: #eef0f2;
    }

    .nav-group .leaf.sel {
      background: var(--blue-light);
      color: var(--blue-dark);
      font-weight: 600;
    }

    .nav-group .leaf .vbadge {
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 3px;
      margin-left: 6px;
    }

    /* Flyer preview */
    .preview-body {
      flex: 1;
      padding: 24px;
    }

    .flyer {
      position: relative;
      width: 100%;
      height: 340px;
      background: #fff;
      border: 1px solid var(--grey-border);
      border-radius: 8px;
      box-shadow: inset 0 0 0 1px #f2f2f2;
    }

    .flyerPreview {
      position: relative;
      width: 40%;
      height: 340px;
      background: #fff;
      border: 1px solid var(--grey-border);
      border-radius: 8px;
      box-shadow: inset 0 0 0 1px #f2f2f2;
    }

    .fl-el {
      position: absolute;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 600;
    }

    .fl-image {
      top: 18px;
      left: 18px;
      width: 200px;
      height: 150px;
      background: #dde7ef;
      color: var(--blue-dark);
      border: 1.5px dashed var(--blue);
    }

    .fl-copy {
      bottom: 24px;
      left: 22px;
      width: 220px;
      height: 60px;
      background: #f0f0f0;
      color: #777;
      border: 1.5px dashed #bbb;
      flex-direction: column;
      gap: 4px;
      align-items: flex-start;
      padding: 10px;
    }

    .fl-price {
      bottom: 24px;
      right: 22px;
      width: 120px;
      height: 80px;
      background: #fbe9d6;
      color: #b9651d;
      border: 1.5px dashed #e08a3d;
      font-size: 14px;
    }

    .fl-logo {
      top: 18px;
      right: 18px;
      width: 110px;
      height: 44px;
      background: #e8e8e8;
      color: #888;
      border: 1.5px dashed #bbb;
    }

    .validation-bar {
      padding: 13px 24px;
      border-top: 1px solid var(--grey-line);
      background: var(--green-bg);
      color: var(--green);
      font-weight: 600;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* Rules */
    .rules-body {
      padding: 18px;
    }

    .field {
      margin-bottom: 16px;
    }

    .field label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-soft);
      margin-bottom: 6px;
    }

    .selectbox {
      width: 100%;
      border: 1px solid var(--grey-border);
      border-radius: 6px;
      padding: 9px 12px;
      font-size: 13px;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .selectbox .cv {
      color: var(--text-light);
    }

    .chk-row {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 5px 0;
      font-size: 13px;
    }

    .chk {
      width: 16px;
      height: 16px;
      border: 1.5px solid var(--grey-border);
      border-radius: 4px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .chk.on {
      background: var(--blue);
      border-color: var(--blue);
      color: #fff;
      font-size: 11px;
    }

    .selected-el {
      font-size: 13.5px;
      font-weight: 700;
      color: var(--blue-dark);
      background: var(--blue-light);
      padding: 8px 12px;
      border-radius: 6px;
      margin-bottom: 16px;
    }

    .yaml {
      background: #1e1e2e;
      color: #cdd6f4;
      border-radius: 8px;
      padding: 14px;
      font-family: "SF Mono", Menlo, Consolas, monospace;
      font-size: 12px;
      line-height: 1.7;
      margin-top: 10px;
    }

    .yaml .k {
      color: #89b4fa;
    }

    .yaml .v {
      color: #a6e3a1;
    }

    .yaml .n {
      color: #fab387;
    }

    .rules-foot {
      display: flex;
      gap: 10px;
      padding: 16px 18px;
      border-top: 1px solid var(--grey-line);
    }

    /* Validation screen */
    .vbanner {
      background: #fafafa;
      border: 1px solid var(--grey-border);
      border-radius: 10px;
      padding: 18px 22px;
      margin-bottom: 20px;
    }

    .vbanner2 {
      background: #fafafa;
      border: 1px solid var(--grey-border);
      border-radius: 10px;
      padding: 18px 22px;
      margin-top: 20px;
      margin-bottom: 20px;
    }

    .vbanner2 .vt {
      font-weight: 700;
      font-size: 16px;
      margin-bottom: 14px;
    }

    .vcheck-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
      font-size: 14px;
      border-bottom: 1px solid var(--grey-line);
    }

    .vcheck-item:last-child {
      border-bottom: none;
    }

    .vc-ico {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      color: #fff;
    }

    .vc-ico.ok {
      background: var(--green);
    }

    .vc-ico.warn {
      background: #e0a93a;
    }

    .two-col {
      display: flex;
      gap: 22px;
      align-items: flex-start;
    }

    .two-col .left {
      flex: 1;
    }

    .two-col .right {
      width: 300px;
    }

    .score-card {
      border: 1px solid var(--grey-border);
      border-radius: 10px;
      padding: 24px;
      text-align: center;
    }

    .score-num {
      font-size: 46px;
      font-weight: 800;
      color: var(--green);
    }

    .score-cap {
      font-size: 13px;
      color: var(--text-soft);
    }

    .score-status {
      margin-top: 14px;
      padding: 8px;
      border-radius: 6px;
      background: var(--yellow-bg);
      color: var(--yellow);
      font-weight: 600;
      font-size: 13px;
    }

    .v-actions {

        modalOverlay.classList.remove('hidden');

      const mainContent = document.getElementById('upload-main-content');
